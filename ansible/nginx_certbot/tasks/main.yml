---
- name: Stop Nginx before Certbot (if running)
  systemd:
    name: nginx
    state: stopped
  become: true
  ignore_errors: true

- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Install Certbot
  apt:
    name: certbot
    state: present

- name: Obtain SSL Certificate for {{ domain_name }}
  command: >
    certbot certonly --standalone
    --non-interactive --agree-tos
    -m {{ certbot_email }}
    -d {{ domain_name }} -d www.{{ domain_name }}
  become: true
  notify: Reload Nginx

- name: Start Nginx after Certbot
  systemd:
    name: nginx
    state: started
    enabled: true
  become: true
...