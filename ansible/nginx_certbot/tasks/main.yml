---
- name: Cross-platform Nginx + Certbot setup with HTTPS
  hosts: all
  become: true
  gather_facts: true

  tasks:

    - name: Install Nginx and Certbot on Debian/Ubuntu
      apt:
        name:
          - nginx
          - certbot
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install Nginx and Certbot on RedHat/CentOS
      yum:
        name:
          - nginx
          - certbot
        state: present
      when: ansible_os_family == "RedHat"

    - name: Stop Nginx before Certbot (if running)
      systemd:
        name: nginx
        state: stopped
      ignore_errors: true

    - name: Obtain SSL Certificate using Certbot
      command: >
        certbot certonly --standalone
        --non-interactive --agree-tos
        -m {{ admin_email }}
        -d {{ domain_name }} -d {{ domain_alias }}
      notify: Reload nginx

    - name: Start and enable Nginx after Certbot
      systemd:
        name: nginx
        state: started
        enabled: true

    - name: Deploy Nginx site config for secureapp
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/sites-available/secureapp
      notify: Reload nginx

    - name: Enable secureapp site
      file:
        src: /etc/nginx/sites-available/secureapp
        dest: /etc/nginx/sites-enabled/secureapp
        state: link

    - name: Remove default Nginx site (optional)
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx
      ignore_errors: true
...