---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Install Certbot
  apt:
    name: certbot
    state: present

- name: Obtain SSL Certificate
  command: >
    certbot certonly --standalone
    --non-interactive --agree-tos
    -m takenseyi@gmail.com
    -d secureapp.shop -d www.secureapp.shop
  notify: Reload Nginx
...