---
# tasks file for deploy_flask
---
- name: Deploy Flask app from Jenkins artifact
  hosts: all
  become: true
  gather_facts: false

  tasks:

    - name: Install unzip on target server
      package:
        name: unzip
        state: present


   # - name: Unzip Flask app
   #   unarchive:
   #     src: "{{ download_dir }}/{{ artifact_name }}"
   #     dest: "{{ deploy_target }}"
   #     remote_src: yes

    - name: Create Python virtual environment and bootstrap pip
      shell: |
        python3 -m venv " {{ deploy_target }} /venv"
        "{{ deploy_target }} /venv/bin/python" -m ensurepip --upgrade
      args:
        creates: "{{ deploy_target }} /venv/bin/activate"

    - name: Install Python dependencies from requirements.txt
      command: " {{ deploy_target }}/venv/bin/pip install -r {{ deploy_target }}/requirements.txt"
      register: pip_install
      failed_when: pip_install.rc != 0

    - name: Show pip install output
      debug:
        msg: "{{ pip_install.stdout }}"

    - name: Start Flask app with Gunicorn on port 5000
      shell: |
        cd "{{ deploy_target }}"
        nohup " {{ deploy_target }}/venv/bin/gunicorn" -w 3 -b 127.0.0.1:5000 app:app &
      args:
        executable: /bin/bash
...